# This rule is not used by the project timeterra itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over timeterra.d3vlo0p.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: timeterra
    app.kubernetes.io/managed-by: kustomize
  name: actionexecution-admin-role
rules:
- apiGroups:
  - timeterra.d3vlo0p.dev
  resources:
  - actionexecutions
  verbs:
  - '*'
- apiGroups:
  - timeterra.d3vlo0p.dev
  resources:
  - actionexecutions/status
  verbs:
  - get
