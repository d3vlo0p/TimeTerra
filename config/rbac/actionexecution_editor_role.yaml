# This rule is not used by the project timeterra itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the timeterra.d3vlo0p.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: timeterra
    app.kubernetes.io/managed-by: kustomize
  name: actionexecution-editor-role
rules:
- apiGroups:
  - timeterra.d3vlo0p.dev
  resources:
  - actionexecutions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - timeterra.d3vlo0p.dev
  resources:
  - actionexecutions/status
  verbs:
  - get
