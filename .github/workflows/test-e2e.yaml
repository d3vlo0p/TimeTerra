name: Test E2E
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.0
      - name: Test E2E
        run: devbox run make test-e2e
